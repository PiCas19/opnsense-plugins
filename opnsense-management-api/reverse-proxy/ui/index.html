<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>OPNsense Demo UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" href="data:,">
  <style>
    :root{--bg:#0b1220;--panel:#111a2b;--muted:#7c8aa0;--primary:#4da3ff;--ok:#22c55e;--bad:#ef4444}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;background:var(--bg);color:#e5efff;font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu}
    header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:linear-gradient(90deg,#0f1a30,#0b1220)}
    h1{margin:0;font-size:18px;font-weight:600}
    main{max-width:1100px;margin:24px auto;padding:0 16px}
    .card{background:var(--panel);border:1px solid #1d2a44;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .pad{padding:18px}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    input,select,button{border-radius:10px;border:1px solid #1d2a44;background:#0c1526;color:#e5efff;padding:10px 12px}
    input::placeholder{color:#6c7a90}
    button{cursor:pointer;background:#153055;border-color:#2a4775}
    button:hover{background:#1a3a66}
    .btn-primary{background:var(--primary);border-color:#3a8de0;color:#051023}
    .btn-primary:hover{filter:brightness(1.05)}
    .btn-danger{background:#5a1e28;border-color:#7a2531}
    .btn-danger:hover{background:#752330}
    .btn-ghost{background:#0c1526;border-color:#1d2a44}
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px}
    .right{margin-left:auto}
    .error{color:#ffb4b4;margin:8px 0 0}
    .ok{color:#9ff5b2;margin:8px 0 0}
    .hidden{display:none}
    table{width:100%;border-collapse:separate;border-spacing:0}
    thead th{text-align:left;color:var(--muted);font-weight:600;padding:12px 14px;border-bottom:1px solid #22314f}
    tbody td{padding:12px 14px;border-bottom:1px solid #152138;vertical-align:middle}
    tr:hover td{background:#0e182b}
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:12px}
    .bg-ok{background:#0e2a1a;color:#78f0a6;border:1px solid #1c5a38}
    .bg-bad{background:#2a1216;color:#ff98a1;border:1px solid #6b2430}
    .muted{color:var(--muted)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .spacer{height:10px}
    details>summary{cursor:pointer;list-style:none}
    details>summary::-webkit-details-marker{display:none}
    details>summary{padding:12px;border:1px solid #1d2a44;border-radius:10px;background:#0c1526}
    .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
    .col-2{grid-column:span 2}.col-3{grid-column:span 3}.col-6{grid-column:span 6}
    .chip{display:inline-flex;gap:8px;align-items:center}

    /* action buttons group */
    .btn-group{display:flex;gap:8px;flex-wrap:wrap}
    .btn-xs{padding:6px 10px;font-size:12px;border-radius:8px}

    /* modal */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:1000}
    .modal.show{display:flex}
    .modal-card{background:var(--panel);border:1px solid #1d2a44;border-radius:14px;max-width:800px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.45)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #22314f}
    .modal-body{padding:16px}
    .kvs{display:grid;grid-template-columns:160px 1fr;gap:6px 14px}
    .kv{color:#9fb0c8}.kv strong{color:#dbe8ff}
    .close-x{background:#5a1e28;border-color:#7a2531}
    .close-x:hover{background:#74212f}

    /* button spinner */
    .btn-busy{opacity:.8;pointer-events:none;position:relative}
    .btn-busy::after{
      content:"";width:14px;height:14px;border:2px solid #fff;border-right-color:transparent;
      border-radius:50%;animation:spin .6s linear infinite;display:inline-block;margin-left:8px;vertical-align:-2px
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <header>
    <h1>OPNsense Demo UI</h1>
    <div id="user-info" class="muted"></div>
  </header>

  <main>
    <!-- LOGIN -->
    <section id="login-card" class="card pad">
      <h2 class="muted" style="margin:0 0 12px">Login</h2>
      <form id="login-form" class="row" autocomplete="off">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button class="btn-primary" type="submit">Sign in</button>
      </form>
      <p id="login-error" class="error hidden"></p>
    </section>

    <div class="spacer"></div>

    <!-- RULES -->
    <section id="rules-card" class="card pad hidden">
      <div class="toolbar">
        <input id="search" placeholder="Search description…">
        <button id="refresh">Refresh</button>
        <div class="right row">
          <button id="apply" class="btn-primary">Apply Pending</button>
          <button id="logout" class="btn-danger">Logout</button>
        </div>
      </div>

      <!-- CREATE RULE -->
      <details id="create-details">
        <summary class="row">
          <strong>Create rule</strong>
          <span class="muted">minimal fields for a demo</span>
        </summary>
        <form id="create-form" style="margin-top:12px">
          <div class="grid">
            <label class="col-3">Description
              <input name="description" placeholder="e.g. Allow HTTPS to WAN" required>
            </label>
            <label class="col-1">Interface
              <select name="interface">
                <option>wan</option>
                <option>lan</option>
                <option>dmz</option>
              </select>
            </label>
            <label class="col-1">Action
              <select name="action">
                <option value="pass" selected>pass</option>
                <option value="block">block</option>
                <option value="reject">reject</option>
              </select>
            </label>
            <label class="col-1">Protocol
              <select name="protocol">
                <option>any</option>
                <option>tcp</option>
                <option>udp</option>
                <option>icmp</option>
              </select>
            </label>
            <label class="col-2">Source net
              <input name="src_net" placeholder="any or 1.2.3.4/32" value="any">
            </label>
            <label class="col-1">Src port
              <input name="src_port" placeholder="optional" inputmode="numeric">
            </label>
            <label class="col-2">Destination net
              <input name="dst_net" placeholder="any or 5.6.7.0/24" value="any">
            </label>
            <label class="col-1">Dst port
              <input name="dst_port" placeholder="443" inputmode="numeric">
            </label>
            <div class="col-3 chip" style="margin-top:6px">
              <label class="chip"><input type="checkbox" name="enabled" checked> Enabled</label>
              <label class="chip"><input type="checkbox" name="log"> Log</label>
              <label class="chip"><input type="checkbox" name="apply"> Apply now</label>
            </div>
            <div class="col-6 row" style="margin-top:4px">
              <button class="btn-primary" type="submit">Create</button>
              <span id="create-msg" class="muted"></span>
            </div>
          </div>
        </form>
      </details>

      <div class="muted" id="meta" style="margin-top:10px"></div>

      <div style="overflow:auto;margin-top:10px">
        <table id="rules-table" class="mono">
          <thead>
            <tr>
              <th>#</th><th>Description</th><th>Action</th><th>Enabled</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <p id="rules-error" class="error hidden"></p>
    </section>
  </main>

  <!-- Modal details -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="mdl-title">
    <div class="modal-card">
      <div class="modal-head">
        <strong id="mdl-title">Rule details</strong>
        <button id="mdl-close" class="close-x">Close</button>
      </div>
      <div class="modal-body">
        <div id="mdl-topline" class="row" style="gap:16px;margin-bottom:10px"></div>
        <div class="kvs">
          <div class="kv">UUID</div><div id="kv-uuid"></div>
          <div class="kv">Description</div><div id="kv-desc"></div>
          <div class="kv">Direction</div><div id="kv-dir"></div>
          <div class="kv">Interface</div><div id="kv-iface"></div>
          <div class="kv">Action</div><div id="kv-action"></div>
          <div class="kv">Protocol</div><div id="kv-proto"></div>
          <div class="kv">Source</div><div id="kv-src"></div>
          <div class="kv">Destination</div><div id="kv-dst"></div>
          <div class="kv">Logging</div><div id="kv-log"></div>
        </div>
      </div>
    </div>
  </div>

<script>
  // ---------- config ----------
  const API = '/api';
  const LS_TOKEN = 'dmz_token';
  const LS_REFRESH = 'dmz_refresh';
  const $ = (q) => document.querySelector(q);
  const show = (el, v=true) => el.classList.toggle('hidden', !v);

  // ---------- token storage ----------
  const getAccess = () => localStorage.getItem(LS_TOKEN);
  const setAccess = (t) => localStorage.setItem(LS_TOKEN, t);
  const getRefresh = () => localStorage.getItem(LS_REFRESH);
  const setRefresh = (t) => localStorage.setItem(LS_REFRESH, t);
  const clearTokens = () => { localStorage.removeItem(LS_TOKEN); localStorage.removeItem(LS_REFRESH); };

  // clone opzioni fetch per retry (body deve essere ricostruito)
  function cloneOpts(opts={}) {
    const o = {...opts, headers: {...(opts.headers||{})}};
    if (opts.body && typeof opts.body === 'string') o.body = opts.body;
    return o;
  }

  // ---------- fetch con auto-refresh ----------
  async function api(path, opts={}) {
    const headers = Object.assign({'Content-Type':'application/json'}, opts.headers || {});
    const tok = getAccess(); if (tok) headers['Authorization'] = 'Bearer ' + tok;

    let res = await fetch(API + path, Object.assign(cloneOpts(opts), {headers}));
    if (res.status !== 401) return parseRes(res);

    // 401: tenta un refresh UNA volta
    const refreshed = await tryRefresh();
    if (!refreshed) return parseRes(res);

    const headers2 = Object.assign({'Content-Type':'application/json'}, opts.headers || {});
    const tok2 = getAccess(); if (tok2) headers2['Authorization'] = 'Bearer ' + tok2;
    res = await fetch(API + path, Object.assign(cloneOpts(opts), {headers: headers2}));
    return parseRes(res);
  }

  async function parseRes(res){
    const ct = res.headers.get('content-type') || '';
    const body = ct.includes('application/json') ? await res.json() : await res.text();
    if (!res.ok) {
      const msg = typeof body === 'string' ? body : (body?.message || JSON.stringify(body));
      throw new Error(`HTTP ${res.status}: ${msg}`);
    }
    return body;
  }

  async function tryRefresh(){
    const r = getRefresh();
    if (!r) return false;
    try {
      const resp = await fetch(API + '/auth/refresh', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ refresh_token: r }),
      });
      if (!resp.ok) { clearTokens(); return false; }
      const data = await resp.json();
      if (!data?.access_token || !data?.refresh_token) { clearTokens(); return false; }
      setAccess(data.access_token);
      setRefresh(data.refresh_token);
      setUserInfo();
      return true;
    } catch {
      clearTokens();
      return false;
    }
  }

  // ---------- UI helpers ----------
  function setUserInfo(){ $('#user-info').textContent = getAccess() ? 'Logged in' : 'Not authenticated'; }
  function showError(el, msg){ el.textContent = msg; el.classList.remove('hidden'); el.classList.remove('ok'); el.classList.add('error'); setTimeout(()=>el.classList.add('hidden'), 5000); }
  function showOk(el, msg){ el.textContent = msg; el.classList.remove('hidden'); el.classList.remove('error'); el.classList.add('ok'); setTimeout(()=>el.classList.add('hidden'), 3000); }
  function setBusy(btn, on, labelBusy="Working…"){
    if(on){ btn.dataset.prev = btn.textContent; btn.textContent = labelBusy; btn.classList.add('btn-busy'); }
    else{ btn.classList.remove('btn-busy'); if(btn.dataset.prev) btn.textContent = btn.dataset.prev; }
  }
  const boolish = (v) => v===1 || v==='1' || v===true || v==='true';
  const esc = (s)=> String(s ?? '').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

  function pickSelected(obj){
    if (obj && typeof obj === 'object' && !Array.isArray(obj)) {
      for (const [k,v] of Object.entries(obj)) {
        if (v && typeof v === 'object' && (v.selected === 1 || v.selected === '1' || v.selected === true)) {
          return v.value ?? k;
        }
      }
      for (const [k,v] of Object.entries(obj)) { if (v && v.value) return v.value; return k; }
    }
    return obj ?? '';
  }
  function badge(enabled){ return enabled ? `<span class="badge bg-ok">enabled</span>` : `<span class="badge bg-bad">disabled</span>`; }

  // ---------- login/logout ----------
  $('#login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = { username: fd.get('username'), password: fd.get('password') };
    try {
      const r = await api('/auth/login', { method:'POST', body: JSON.stringify(payload) });
      const at = r.access_token || r.token;
      const rt = r.refresh_token;
      if (!at || !rt) throw new Error('Missing token in response');
      setAccess(at); setRefresh(rt);
      setUserInfo();
      await loadRules();
      show($('#login-card'), false); show($('#rules-card'), true);
    } catch (err) {
      showError($('#login-error'), String(err.message || err));
    }
  });

  $('#logout').addEventListener('click', () => {
    clearTokens();
    setUserInfo();
    show($('#rules-card'), false);
    show($('#login-card'), true);
  });

  // ---------- rules / actions ----------
  $('#refresh').addEventListener('click', () => loadRules());

  const applyBtn = $('#apply');
  applyBtn.addEventListener('click', async () => {
    try {
      setBusy(applyBtn, true, 'Applying…');
      await api('/rules/apply', { method:'POST' });
      showOk($('#rules-error'), 'Configuration applied');
      await loadRules();   // AJAX refresh
    } catch (e) { showError($('#rules-error'), e.message); }
    finally { setBusy(applyBtn, false); }
  });

  $('#search').addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); loadRules(); } });

  async function loadRules() {
    const s = ($('#search').value || '').trim();
    try {
      const data = await api('/rules?search=' + encodeURIComponent(s));
      renderRules(data?.rows || []);
      $('#meta').textContent = `Total: ${data?.total ?? 0}`;
    } catch (e) { renderRules([]); showError($('#rules-error'), e.message); }
  }

  function renderRules(rows) {
    const tb = $('#tbody'); tb.innerHTML = '';
    if (!rows.length) {
      tb.innerHTML = `<tr><td colspan="5" class="muted">No rules found</td></tr>`;
      return;
    }
    rows.forEach((r, i) => {
      const isEnabled = boolish(r.enabled ?? r.enable);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i+1}</td>
        <td>${esc(r.description || '')}</td>
        <td>${esc(r.action || '')}</td>
        <td>${badge(isEnabled)}</td>
        <td>
          <div class="btn-group">
            <button class="btn-xs btn-ghost btn-toggle"  data-uuid="${esc(r.uuid)}" data-enabled="${isEnabled ? '1':'0'}">Toggle</button>
            <button class="btn-xs btn-ghost btn-details" data-uuid="${esc(r.uuid)}">Details</button>
            <button class="btn-xs btn-danger btn-delete"  data-uuid="${esc(r.uuid)}">Delete</button>
          </div>
        </td>`;
      tb.appendChild(tr);
    });
  }

  // Toggle click (delegation)
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('button.btn-toggle');
    if (!btn) return;
    const uuid = btn.getAttribute('data-uuid');
    const current = btn.getAttribute('data-enabled') === '1';
    try {
      setBusy(btn, true, current ? 'Disabling…' : 'Enabling…');
      await api(`/rules/${encodeURIComponent(uuid)}/toggle`, {
        method:'POST',
        body: JSON.stringify({ enabled: !current, apply: false })
      });
      await loadRules();
    } catch (err) { showError($('#rules-error'), err.message); }
    finally { setBusy(btn, false); }
  });

  // Details click
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('button.btn-details');
    if (!btn) return;
    const uuid = btn.getAttribute('data-uuid');
    try {
      const data = await api(`/rules/${encodeURIComponent(uuid)}`, { method:'GET' });
      const rule = data?.rule || data;
      fillDetails(uuid, rule);
      openModal();
    } catch (err) { showError($('#rules-error'), err.message); }
  });

  // Delete click
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('button.btn-delete');
    if (!btn) return;
    const uuid = btn.getAttribute('data-uuid');
    if (!confirm(`Delete rule ${uuid}?`)) return;
    try {
      setBusy(btn, true, 'Deleting…');
      await api(`/rules/${encodeURIComponent(uuid)}`, { method:'DELETE' });
      await loadRules();
      showOk($('#rules-error'), 'Rule deleted');
    } catch (err) { showError($('#rules-error'), err.message); }
    finally { setBusy(btn, false); }
  });

  // Create rule
  $('#create-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const rule = {
      enabled: fd.get('enabled') ? '1' : '0',
      interface: fd.get('interface') || 'wan',
      direction: 'in',
      ipprotocol: 'inet',
      protocol: fd.get('protocol') || 'any',
      action: fd.get('action') || 'pass',
      description: (fd.get('description') || '').trim(),
      source_net: (fd.get('src_net') || 'any').trim() || 'any',
      source_port: (fd.get('src_port') || '').trim(),
      destination_net: (fd.get('dst_net') || 'any').trim() || 'any',
      destination_port: (fd.get('dst_port') || '').trim(),
      log: fd.get('log') ? '1' : '0',
      quick: '1',
      floating: '0'
    };
    const applyNow = !!fd.get('apply');
    const btn = e.target.querySelector('button[type="submit"]');
    try {
      setBusy(btn, true, 'Creating…');
      const res = await api('/rules', { method:'POST', body: JSON.stringify({ rule, apply: applyNow }) });
      showOk($('#create-msg'), `Created (uuid: ${res?.result?.uuid || res?.result?.opnsense_uuid || 'n/a'})${applyNow?' & applied':''}`);
      e.target.reset();
      e.target.querySelector('select[name="interface"]').value = 'wan';
      e.target.querySelector('select[name="action"]').value = 'pass';
      e.target.querySelector('select[name="protocol"]').value = 'any';
      loadRules();
    } catch (err) { showError($('#create-msg'), String(err.message || err)); }
    finally { setBusy(btn, false); }
  });

  // ---------- details modal ----------
  const modal = document.getElementById('modal');
  document.getElementById('mdl-close').addEventListener('click', closeModal);
  modal.addEventListener('click', (e)=>{ if(e.target === modal) closeModal(); });

  function openModal(){ modal.classList.add('show'); }
  function closeModal(){ modal.classList.remove('show'); }

  function fillDetails(uuid, r){
    const enabled = boolish(r.enabled ?? r.enable);
    const iface = pickSelected(r.interface ?? r.if ?? r.iface);
    const action = pickSelected(r.action);
    const proto  = pickSelected(r.protocol);
    const direction = r.direction ?? r.dir ?? '';
    const sNet = r.source_net ?? r.source ?? 'any';
    const sPort = r.source_port ?? r.src_port ?? '';
    const dNet = r.destination_net ?? r.destination ?? 'any';
    const dPort = r.destination_port ?? r.dst_port ?? '';
    const log = boolish(r.log);

    document.getElementById('mdl-title').textContent = 'Rule details';
    document.getElementById('mdl-topline').innerHTML =
      `${badge(enabled)} <span class="muted">iface:</span> <strong>${esc(iface || '-')}</strong> ` +
      `<span class="muted">action:</span> <strong>${esc(action || '-')}</strong> ` +
      `<span class="muted">protocol:</span> <strong>${esc(proto || '-')}</strong>`;
    document.getElementById('kv-uuid').textContent = uuid || (r.uuid ?? '');
    document.getElementById('kv-desc').textContent = r.description || '';
    document.getElementById('kv-dir').textContent = direction || '';
    document.getElementById('kv-iface').textContent = iface || '';
    document.getElementById('kv-action').textContent = action || '';
    document.getElementById('kv-proto').textContent = proto || '';
    document.getElementById('kv-src').textContent = `${sNet}${sPort ? ':'+sPort : ''}`;
    document.getElementById('kv-dst').textContent = `${dNet}${dPort ? ':'+dPort : ''}`;
    document.getElementById('kv-log').textContent = log ? 'enabled' : 'disabled';
  }

  // ---------- boot ----------
  (async function boot(){
    setUserInfo();
    if (getAccess()) {
      try { await loadRules(); document.getElementById('login-card').classList.add('hidden'); document.getElementById('rules-card').classList.remove('hidden'); }
      catch { /* token non valido */ }
    }
  })();
</script>
</body>
</html>
