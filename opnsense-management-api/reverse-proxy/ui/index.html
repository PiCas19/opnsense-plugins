<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>OPNsense Demo UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" href="data:,">
  <style>
    :root{--bg:#0b1220;--panel:#111a2b;--muted:#7c8aa0;--primary:#4da3ff;--ok:#22c55e;--bad:#ef4444}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;background:var(--bg);color:#e5efff;font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu}
    header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:linear-gradient(90deg,#0f1a30,#0b1220)}
    h1{margin:0;font-size:18px;font-weight:600}
    main{max-width:1100px;margin:24px auto;padding:0 16px}
    .card{background:var(--panel);border:1px solid #1d2a44;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .pad{padding:18px}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    input,select,button{border-radius:10px;border:1px solid #1d2a44;background:#0c1526;color:#e5efff;padding:10px 12px}
    input::placeholder{color:#6c7a90}
    button{cursor:pointer;background:#153055;border-color:#2a4775}
    button:hover{background:#1a3a66}
    .btn-primary{background:var(--primary);border-color:#3a8de0;color:#051023}
    .btn-primary:hover{filter:brightness(1.05)}
    .btn-danger{background:#5a1e28;border-color:#7a2531}
    .btn-danger:hover{background:#752330}
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px}
    .right{margin-left:auto}
    .error{color:#ffb4b4;margin:8px 0 0}
    .ok{color:#9ff5b2;margin:8px 0 0}
    .hidden{display:none}
    table{width:100%;border-collapse:separate;border-spacing:0}
    thead th{text-align:left;color:var(--muted);font-weight:600;padding:12px 14px;border-bottom:1px solid #22314f}
    tbody td{padding:12px 14px;border-bottom:1px solid #152138}
    tr:hover td{background:#0e182b}
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:12px}
    .bg-ok{background:#0e2a1a;color:#78f0a6;border:1px solid #1c5a38}
    .bg-bad{background:#2a1216;color:#ff98a1;border:1px solid #6b2430}
    .muted{color:var(--muted)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .spacer{height:10px}

    /* modal */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px}
    .modal.open{display:flex}
    .modal .box{width:min(800px,95vw);background:#0e182b;border:1px solid #203659;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
    .modal .hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #203659}
    .modal .body{padding:16px}
    .chips{display:flex;gap:10px;flex-wrap:wrap}
    .chip{border-radius:999px;border:1px solid #24436d;background:#122242;padding:4px 10px;font-size:12px}
    .kv{display:grid;grid-template-columns:160px 1fr;gap:6px 12px}
    .kv div:nth-child(odd){color:var(--muted)}
  </style>
</head>
<body>
  <header>
    <h1>OPNsense Demo UI</h1>
    <div id="user-info" class="muted"></div>
  </header>

  <main>
    <!-- LOGIN -->
    <section id="login-card" class="card pad">
      <h2 class="muted" style="margin:0 0 12px">Login</h2>
      <form id="login-form" class="row" autocomplete="off">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button class="btn-primary" type="submit">Sign in</button>
      </form>
      <p id="login-error" class="error hidden"></p>
    </section>

    <div class="spacer"></div>

    <!-- RULES -->
    <section id="rules-card" class="card pad hidden">
      <div class="toolbar">
        <input id="search" placeholder="Search description…">
        <button id="refresh">Refresh</button>
        <div class="right row">
          <button id="apply" class="btn-primary">Apply pending</button>
          <button id="logout" class="btn-danger">Logout</button>
        </div>
      </div>

      <div class="muted" id="meta" style="margin-top:6px"></div>

      <div style="overflow:auto;margin-top:10px">
        <table id="rules-table" class="mono">
          <thead>
            <tr>
              <th>#</th><th>Description</th><th>Interface</th><th>Action</th><th>Protocol</th><th>Enabled</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <p id="rules-error" class="error hidden"></p>
    </section>
  </main>

  <!-- DETAILS MODAL -->
  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <div class="box">
      <div class="hdr">
        <strong style="font-size:15px">Rule details</strong>
        <div id="chips" class="chips"></div>
        <button id="closeModal" class="btn-danger" style="margin-left:auto">Close</button>
      </div>
      <div class="body">
        <div class="kv" id="kv"></div>
      </div>
    </div>
  </div>

  <script>
    // ---------- config ----------
    const API = '/api';
    const LS_TOKEN = 'dmz_token';
    const $ = (q) => document.querySelector(q);
    const show = (el, v=true) => el.classList.toggle('hidden', !v);

    // ---------- auth & fetch ----------
    const getToken = () => localStorage.getItem(LS_TOKEN);
    const setToken = (t) => localStorage.setItem(LS_TOKEN, t);
    const clearToken = () => localStorage.removeItem(LS_TOKEN);

    async function api(path, opts={}) {
      const headers = Object.assign({'Content-Type':'application/json'}, opts.headers || {});
      const tok = getToken(); if (tok) headers['Authorization'] = 'Bearer ' + tok;
      const res = await fetch(API + path, Object.assign(opts, {headers}));
      const ct = res.headers.get('content-type') || '';
      const body = ct.includes('application/json') ? await res.json() : await res.text();
      if (!res.ok) {
        const msg = typeof body === 'string' ? body : (body?.message || JSON.stringify(body));
        throw new Error(`HTTP ${res.status}: ${msg}`);
      }
      return body;
    }

    // ---------- utils: pick selected option ----------
    function pickSelected(v){
      // string/number -> toString
      if (v == null) return '';
      if (typeof v !== 'object') return String(v);
      // object with many options: find one with selected truthy
      for (const k of Object.keys(v)){
        const opt = v[k];
        if (opt && (opt.selected === 1 || opt.selected === '1' || opt.selected === true)) {
          return opt.value ?? k;
        }
      }
      // single object {value,selected}? take value
      if ('value' in v) return String(v.value);
      // fallback: first value
      const first = Object.values(v)[0];
      return first && first.value ? String(first.value) : '';
    }
    const yes = (x) => x === 1 || x === '1' || x === true || x === 'true';

    function normalize(r){
      return {
        uuid: r.uuid || r.ruleid || '',
        description: r.description || '',
        iface: pickSelected(r.interface) || r.interface || '',
        action: pickSelected(r.action) || r.action || '',
        protocol: pickSelected(r.protocol) || r.protocol || 'any',
        direction: pickSelected(r.direction) || r.direction || '',
        enabled: yes(r.enabled) || yes(r.enable),
        log: yes(r.log),
        source_net: r.source_net || r.source || pickSelected(r.source) || 'any',
        source_port: r.source_port || r.src_port || '',
        destination_net: r.destination_net || r.destination || pickSelected(r.destination) || 'any',
        destination_port: r.destination_port || r.dst_port || '',
        quick: yes(r.quick),
        floating: yes(r.floating)
      };
    }

    // ---------- UI helpers ----------
    function setUserInfo(){ $('#user-info').textContent = getToken() ? 'Logged in' : 'Not authenticated'; }
    function showError(el,msg){ el.textContent=msg; el.classList.remove('ok'); el.classList.remove('hidden'); setTimeout(()=>el.classList.add('hidden'),5000); }
    function badge(enabled){ return enabled ? `<span class="badge bg-ok">enabled</span>` : `<span class="badge bg-bad">disabled</span>`; }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

    // ---------- login ----------
    $('#login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        const r = await api('/auth/login',{method:'POST',body:JSON.stringify({username:fd.get('username'),password:fd.get('password')})});
        const tok = r.token || r.access_token; if(!tok) throw new Error('Missing token in response');
        setToken(tok); setUserInfo(); await loadRules(); show($('#login-card'),false); show($('#rules-card'),true);
      } catch(err){ showError($('#login-error'), String(err.message||err)); }
    });
    $('#logout').addEventListener('click', ()=>{ clearToken(); setUserInfo(); show($('#rules-card'),false); show($('#login-card'),true); });

    // ---------- rules ----------
    $('#refresh').addEventListener('click', ()=> loadRules());
    $('#apply').addEventListener('click', async ()=>{
      try{ await api('/rules/apply',{method:'POST'}); await loadRules(); }catch(e){ showError($('#rules-error'), e.message); }
    });
    $('#search').addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); loadRules(); } });

    async function loadRules(){
      const s = ($('#search').value||'').trim();
      try{
        const data = await api('/rules?search='+encodeURIComponent(s));
        renderRules(data?.rows||[]);
        $('#meta').textContent = `Total: ${data?.total ?? 0}`;
      }catch(e){ renderRules([]); showError($('#rules-error'), e.message); }
    }

    function renderRules(rows){
      const tb = $('#tbody'); tb.innerHTML = '';
      if (!rows.length){ tb.innerHTML = `<tr><td colspan="7" class="muted">No rules found</td></tr>`; return; }
      rows.forEach((raw, i)=>{
        const r = normalize(raw);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i+1}</td>
          <td>${escapeHtml(r.description)}</td>
          <td>${escapeHtml(r.iface)}</td>
          <td>${escapeHtml(r.action)}</td>
          <td>${escapeHtml(r.protocol)}</td>
          <td>${badge(r.enabled)}</td>
          <td class="row" style="gap:6px">
            <button data-act="toggle" data-uuid="${r.uuid}" data-enabled="${r.enabled ? '1':'0'}">Toggle</button>
            <button data-act="details" data-uuid="${r.uuid}">Details</button>
          </td>`;
        tb.appendChild(tr);
      });
    }

    // delegate buttons
    document.addEventListener('click', async (e)=>{
      const btn = e.target.closest('button[data-act]');
      if(!btn) return;
      const act = btn.getAttribute('data-act');
      const uuid = btn.getAttribute('data-uuid');

      if (act === 'toggle'){
        const current = btn.getAttribute('data-enabled') === '1';
        try{
          await api(`/rules/${encodeURIComponent(uuid)}/toggle`, {method:'POST', body: JSON.stringify({enabled: !current, apply: false})});
          await loadRules(); // refresh to reflect enabled/disabled
        }catch(err){ showError($('#rules-error'), err.message); }
      }

      if (act === 'details'){
        try{
          const res = await api(`/rules/${encodeURIComponent(uuid)}`, {method:'GET'});
          const r = normalize(res?.rule || res);
          openDetails(r);
        }catch(err){ showError($('#rules-error'), err.message); }
      }
    });

    // ---------- details modal ----------
    function openDetails(r){
      const chips = $('#chips');
      chips.innerHTML = `
        <span class="chip">${r.enabled ? 'enabled' : 'disabled'}</span>
        <span class="chip">iface: ${escapeHtml(r.iface||'-')}</span>
        <span class="chip">action: ${escapeHtml(r.action||'-')}</span>
        <span class="chip">protocol: ${escapeHtml(r.protocol||'-')}</span>`;

      const kv = $('#kv');
      kv.innerHTML = `
        <div>Description</div><div>${escapeHtml(r.description||'-')}</div>
        <div>UUID</div><div class="mono">${escapeHtml(r.uuid||'-')}</div>
        <div>Direction</div><div>${escapeHtml(r.direction||'-')}</div>
        <div>Source</div><div>${escapeHtml(r.source_net||'any')}${r.source_port?':'+escapeHtml(r.source_port):''}</div>
        <div>Destination</div><div>${escapeHtml(r.destination_net||'any')}${r.destination_port?':'+escapeHtml(r.destination_port):''}</div>
        <div>Log</div><div>${r.log ? 'on' : 'off'}</div>
        <div>Quick</div><div>${r.quick ? 'yes' : 'no'}</div>
        <div>Floating</div><div>${r.floating ? 'yes' : 'no'}</div>
      `;
      $('#modal').classList.add('open');
    }
    $('#closeModal').addEventListener('click', ()=> $('#modal').classList.remove('open'));
    $('#modal').addEventListener('click', (e)=>{ if(e.target.id==='modal') $('#modal').classList.remove('open'); });

    // ---------- boot ----------
    (async function(){
      setUserInfo();
      if (getToken()){
        try{ await loadRules(); show($('#login-card'),false); show($('#rules-card'),true); }catch{/* token non valido */}
      }
    })();
  </script>
</body>
</html>
