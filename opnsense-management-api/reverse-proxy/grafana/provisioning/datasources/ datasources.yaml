apiVersion: 1

datasources:
  # Database del wrapper (Postgres)
  - name: OPNsense API
    type: postgres
    access: proxy
    url: ${POSTGRES_HOST:-192.168.216.50}:${POSTGRES_PORT:-5432}
    database: ${POSTGRES_DB:-opnsense_mgmt}
    user: ${POSTGRES_USER:-opnsense}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
    editable: false

  # JSON datasource che chiama il wrapper (server-side, niente CORS)
  - name: OPNsense Direct API
    type: marcusolsson-json-datasource
    access: proxy
    # Consigliato: puntare DIRETTAMENTE al wrapper per evitare la Basic del reverse-proxy
    url: ${OPNSENSE_API_URL:-http://192.168.216.50:3000}
    jsonData:
      # Header names
      httpHeaderName1: 'Authorization'
      httpHeaderName2: 'Content-Type'
    secureJsonData:
      # Un solo Authorization: Bearer <JWT> del wrapper
      httpHeaderValue1: 'Bearer ${JWT_TOKEN}'
      httpHeaderValue2: 'application/json'
    isDefault: false
    editable: false