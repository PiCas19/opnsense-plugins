services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opnsense-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP (redirect a HTTPS)
      - "443:443"  # HTTPS esposto in WAN
    environment:
      # BACKEND OPNsense (GUI+API)
      OPNSENSE_WEB_SCHEME: https
      OPNSENSE_WEB_HOST: 192.168.216.1:443
      # BACKEND tuo wrapper API
      WRAPPER_SCHEME: http
      WRAPPER_HOST: 192.168.216.50:3000
      # TLS / Nginx
      PUBLIC_FQDN: vpn.example.com
      NGINX_CLIENT_MAX_BODY_SIZE: 10m
      # Basic Auth (utente che mi hai indicato)
      BASIC_AUTH_USER: opnsense-api
      BASIC_AUTH_PASSWORD: CambiaSubito_!  # metti la password che vuoi usare sul proxy
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/ssl:/etc/ssl/nginx
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
