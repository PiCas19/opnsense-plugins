services:
  nginx:
    image: nginx:1.25-alpine
    container_name: ${CONTAINER_NAME:-opnsense-reverse-proxy}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    dns:
      - ${DOCKER_DNS:-172.16.216.1}
    env_file:
      - .env
    environment:
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-10m}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./nginx/ssl:/etc/ssl/nginx
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-10s}
    networks:
      dmz_macvlan:
        ipv4_address: 172.16.216.21   # IP DEDICATO del container

networks:
  dmz_macvlan:
    driver: macvlan
    driver_opts:
      parent: enp0s3                  # NIC dell’host collegata alla DMZ (cambiala se diverso)
    ipam:
      config:
        - subnet: "172.16.216.0/24"
          gateway: "172.16.216.1"