services:
  dmz-api:
    build: ./api
    env_file: .env
    environment:
      - DMZ_HOST=${DMZ_HOST}
      - DMZ_PORT=${DMZ_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - DEMO_USERNAME=${DEMO_USERNAME}
      - DEMO_PASSWORD=${DEMO_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES}
      - WRAPPER_BASE_URL=${WRAPPER_BASE_URL}
      - WRAPPER_VERIFY_SSL=${WRAPPER_VERIFY_SSL}
      - WRAPPER_TIMEOUT=${WRAPPER_TIMEOUT}
    networks: [dmznet]
    expose:
     - "443:443"

  nginx:
    image: nginx:1.27-alpine
    env_file: .env
    depends_on: [dmz-api]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ui:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "443:443"
      # - "80:80"  # opzionale per redirect
    networks: [dmznet]

networks:
  dmznet: {}
