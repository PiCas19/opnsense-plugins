services:
  nginx:
    build:
      context: .
      dockerfile: ${DOCKERFILE_PATH:-Dockerfile}
    container_name: ${CONTAINER_NAME:-opnsense-reverse-proxy}
    restart: unless-stopped

    # porte pubblicate (parametrizzabili)
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"

    # carica tutte le variabili anche dentro al container
    env_file:
      - .env
    # e passa esplicitamente quelle usate dall'entrypoint/template
    environment:
      OPNSENSE_WEB_SCHEME: ${OPNSENSE_WEB_SCHEME}
      OPNSENSE_WEB_HOST: ${OPNSENSE_WEB_HOST}
      WRAPPER_SCHEME: ${WRAPPER_SCHEME}
      WRAPPER_HOST: ${WRAPPER_HOST}
      PUBLIC_FQDN: ${PUBLIC_FQDN}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-10m}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD}

    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/ssl:/etc/ssl/nginx
      - ./logs/nginx:/var/log/nginx

    # DNS per i container (utile in DMZ)
    dns:
      - ${DOCKER_DNS:-172.16.216.1}

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-10s}
