services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: opnsense-reverse-proxy
    restart: unless-stopped
    depends_on:
      - grafana
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_FQDN: ${PUBLIC_FQDN}
      OPNSENSE_API_HOST: ${OPNSENSE_API_HOST}
      OPNSENSE_API_PORT: ${OPNSENSE_API_PORT}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD}
    volumes:
      # Config Nginx + Basic Auth + SSL (rw così l’entrypoint può creare i cert se mancano)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./nginx/ssl:/etc/ssl/nginx
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - frontend
      - backend

  grafana:
    image: grafana/grafana:10.2.0
    container_name: opnsense-grafana
    restart: unless-stopped
    environment:
      # Server
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_LOG_LEVEL: ${GF_LOG_LEVEL}
      # Admin
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"
      # Database (usa Postgres del wrapper; se non vuoi Postgres, commenta le 6 righe seguenti)
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: ${POSTGRES_HOST}:${POSTGRES_PORT}
      GF_DATABASE_NAME: ${GRAFANA_DB}
      GF_DATABASE_USER: ${POSTGRES_USER}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      # Plugin utili
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel,marcusolsson-json-datasource
      # URL del wrapper (comodo per datasource JSON)
      OPNSENSE_API_URL: ${OPNSENSE_API_URL}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./logs/grafana:/var/log/grafana
    healthcheck:
      # Grafana espone /api/health su 3000
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  grafana_data:
    driver: local