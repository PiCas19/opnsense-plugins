worker_processes  1;

events { worker_connections  1024; }

http {
  sendfile on;
  server_tokens off;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml;

  # opzionale: HTTP->HTTPS
  # server {
  #   listen 80;
  #   server_name $SERVER_NAME;
  #   return 301 https://$host$request_uri;
  # }

  server {
    listen 443 ssl http2;
    server_name demo.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # UI statica
    root /usr/share/nginx/html;
    index index.html;

    # Security headers base
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Proxy per l'API DMZ (BFF)
    location /api/ {
      proxy_pass http://dmz-api:8000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # opzionale: esponi docs BFF (solo demo – togli in prod)
    location /docs { proxy_pass http://dmz-api:8000/docs; }
    location /openapi.json { proxy_pass http://dmz-api:8000/openapi.json; }
  }
}
