user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events { 
    worker_connections 1024; 
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE};

    # Backend OPNsense (GUI/API) e wrapper
    upstream opnsense_web {
        server ${OPNSENSE_WEB_HOST};
    }
    upstream wrapper_api {
        server ${WRAPPER_HOST};
    }

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/ssl/nginx/server.crt;
        ssl_certificate_key /etc/ssl/nginx/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Health check (senza auth)
        location = /health { 
            access_log off;
            return 200 "healthy\n"; 
            add_header Content-Type text/plain;
        }

        # (Opzionale) pagina radice -> OPNsense
        location = / { 
            return 302 https://$host/opnsense/; 
        }

        # Basic Auth per tutto il resto
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd;

        # ---- OPNsense GUI/API ----
        location /opnsense/ {
            proxy_pass ${OPNSENSE_WEB_SCHEME}://opnsense_web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Gestione WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Riscrive i cookie path per tenere il prefisso /opnsense/
            proxy_cookie_path / /opnsense/;
            proxy_buffering off;
            
            # SSL backend
            proxy_ssl_verify off;
            proxy_ssl_session_reuse on;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ---- Wrapper API (il tuo servizio) ----
        location /api/ {
            proxy_pass ${WRAPPER_SCHEME}://wrapper_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}