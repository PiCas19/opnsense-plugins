# Usa i profili:
#   VM LAN: docker compose --profile lan up -d
#   VM DMZ: docker compose --profile dmz up -d
#
# Suggerito:
#   - Imposta LAN_HOST_IP (es. 192.168.216.50) per legare l'API solo alla LAN.
#   - Imposta DMZ_HOST_IP (es. 172.16.216.20) per esporre Nginx solo in DMZ.
#   - NON definire IPAM con la subnet DMZ per evitare conflitti.

services:
  # === LAN PROFILE ===
  opnsense-api:
    profiles: ["lan"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opnsense-management-api
    restart: unless-stopped
    environment:
      # App/HTTP
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      API_PORT: ${PORT:-3000}
      API_HOST: 0.0.0.0

      # Database (coerenti con .env.template)
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # OPNsense
      OPNSENSE_BASE_URL: ${OPNSENSE_BASE_URL}
      OPNSENSE_API_KEY: ${OPNSENSE_API_KEY}
      OPNSENSE_API_SECRET: ${OPNSENSE_API_SECRET}
      OPNSENSE_SSL_VERIFY: ${OPNSENSE_SSL_VERIFY:-false}
      OPNSENSE_TIMEOUT: ${OPNSENSE_TIMEOUT:-30000}
      OPNSENSE_CACHE_TIMEOUT: ${OPNSENSE_CACHE_TIMEOUT:-60}
      MAX_API_RETRIES: ${MAX_API_RETRIES:-3}
      API_REQUEST_TIMEOUT: ${API_REQUEST_TIMEOUT:-10000}

      # Sicurezza/CORS
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      CORS_ORIGIN: ${CORS_ORIGIN}
      HELMET_ENABLED: ${HELMET_ENABLED}
      CSRF_ENABLED: ${CSRF_ENABLED}

      # Metrics (se usi /metrics)
      METRICS_ENABLED: ${METRICS_ENABLED}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    # Binda l'API SOLO all'IP LAN della VM (facoltativo: default 0.0.0.0)
    ports:
      - "${LAN_HOST_IP:-0.0.0.0}:3000:3000"

    volumes:
      - ./logs:/app/logs
      - ./temp:/app/temp

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    profiles: ["lan"]
    image: postgres:15-alpine
    container_name: opnsense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opnsense_mgmt}
      POSTGRES_USER: ${POSTGRES_USER:-opnsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./monitoring/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opnsense} -d ${POSTGRES_DB:-opnsense_mgmt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["lan"]
    image: redis:7-alpine
    container_name: opnsense-redis
    restart: unless-stopped
    command: ["sh","-c","exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === DMZ PROFILE ===
  grafana:
    profiles: ["dmz"]
    image: grafana/grafana:10.2.0
    container_name: opnsense-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 5

  prometheus:
    profiles: ["dmz"]
    image: prom/prometheus:v2.47.0
    container_name: opnsense-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nagios:
    profiles: ["dmz"]
    build:
      context: ./monitoring/nagios
      dockerfile: Dockerfile
    container_name: opnsense-nagios
    restart: unless-stopped
    environment:
      NAGIOS_USER: ${NAGIOS_USER:-nagiosadmin}
      NAGIOS_PASS: ${NAGIOS_PASS}
    volumes:
      - nagios_etc:/opt/nagios/etc
      - nagios_var:/opt/nagios/var
      - ./monitoring/nagios/plugins:/opt/nagios/libexec/custom
    depends_on:
      - grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 60s
      timeout: 10s
      retries: 3

  nginx:
    profiles: ["dmz"]
    image: nginx:alpine
    container_name: opnsense-nginx
    restart: unless-stopped
    depends_on:
      - grafana
      - prometheus
      - nagios
    ports:
      - "${DMZ_HOST_IP:-0.0.0.0}:443:443"
      - "${DMZ_HOST_IP:-0.0.0.0}:80:80"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./monitoring/nginx/ssl:/etc/nginx/ssl:ro
      - ./monitoring/nginx/htpasswd:/etc/nginx/htpasswd:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  nagios_etc:
    driver: local
  nagios_var:
    driver: local