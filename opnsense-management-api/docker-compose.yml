# Usa i profili:
#   VM LAN: docker compose --profile lan up -d
#   VM DMZ: docker compose --profile dmz up -d

services:
  # === LAN PROFILE ===
  opnsense-api:
    profiles: ["lan"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opnsense-management-api
    restart: unless-stopped
    environment:
      # App/HTTP
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      API_PORT: ${PORT:-3000}
      API_HOST: 0.0.0.0

      # Database
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # OPNsense
      OPNSENSE_BASE_URL: ${OPNSENSE_BASE_URL}
      OPNSENSE_API_KEY: ${OPNSENSE_API_KEY}
      OPNSENSE_API_SECRET: ${OPNSENSE_API_SECRET}
      OPNSENSE_SSL_VERIFY: ${OPNSENSE_SSL_VERIFY:-false}
      OPNSENSE_TIMEOUT: ${OPNSENSE_TIMEOUT:-30000}
      OPNSENSE_CACHE_TIMEOUT: ${OPNSENSE_CACHE_TIMEOUT:-60}
      MAX_API_RETRIES: ${MAX_API_RETRIES:-3}
      API_REQUEST_TIMEOUT: ${API_REQUEST_TIMEOUT:-10000}

      # Sicurezza/CORS
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      CORS_ORIGIN: ${CORS_ORIGIN}
      HELMET_ENABLED: ${HELMET_ENABLED}
      CSRF_ENABLED: ${CSRF_ENABLED}

      # Metrics
      METRICS_ENABLED: ${METRICS_ENABLED}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "${LAN_HOST_IP:-0.0.0.0}:3000:3000"

    volumes:
      - ./logs:/app/logs
      - ./temp:/app/temp

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    profiles: ["lan"]
    image: postgres:15-alpine
    container_name: opnsense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opnsense_mgmt}
      POSTGRES_USER: ${POSTGRES_USER:-opnsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opnsense} -d ${POSTGRES_DB:-opnsense_mgmt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["lan"]
    image: redis:7-alpine
    container_name: opnsense-redis
    restart: unless-stopped
    command: ["sh","-c",'exec redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli ${REDIS_PASSWORD:+-a "$REDIS_PASSWORD"} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s


# === DMZ PROFILE ===
  grafana:
    profiles: ["dmz"]
    image: grafana/grafana:10.2.0
    container_name: opnsense-grafana
    restart: unless-stopped
    user: "0"  
    environment:
      # Admin credentials
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      
      # Server configuration for reverse proxy
      GF_SERVER_DOMAIN: ${DMZ_HOST_IP:-172.16.216.20}
      GF_SERVER_ROOT_URL: https://${DMZ_HOST_IP:-172.16.216.20}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_HTTP_PORT: "3000"
      
      # Security settings
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      
      # Plugins
      GF_INSTALL_PLUGINS: grafana-clock-panel,marcusolsson-json-datasource
      
      # Analytics
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      
      # Security headers
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
      
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
      
    networks:
      - monitoring
      
  prometheus:
    profiles: ["dmz"]
    image: prom/prometheus:v2.47.0
    container_name: opnsense-prometheus
    restart: unless-stopped
    user: "65534:65534" 
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB  
      - --web.enable-lifecycle
      - --web.enable-admin-api 
      - --web.external-url=/prometheus/
      - --web.route-prefix=/
      - --log.level=info
      
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
      
    networks:
      - monitoring

  nagios:
    profiles: ["dmz"]
    image: jasonrivers/nagios:latest
    container_name: opnsense-nagios
    restart: unless-stopped
    environment:
      # Admin credentials
      NAGIOS_USER: ${NAGIOS_USER:-nagiosadmin}
      NAGIOS_PASS: ${NAGIOS_PASS:-nagiosadmin}
      NAGIOS_TIMEZONE: ${TZ:-UTC}
      
      # Web configuration
      NAGIOS_FQDN: ${DMZ_HOST_IP:-172.16.216.20}
      APACHE_RUN_USER: nagios
      APACHE_RUN_GROUP: nagios
      
    volumes:
      - nagios_var:/opt/nagios/var
      - nagios_etc:/opt/nagios/etc
      - ./monitoring/nagios/plugins:/opt/nagios/libexec/custom:ro
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nagios/"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
      
    networks:
      - monitoring

  nginx:
    profiles: ["dmz"]
    image: nginx:alpine
    container_name: opnsense-nginx
    restart: unless-stopped
    
    depends_on:
      grafana:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      nagios:
        condition: service_started
        
    ports:
      - "${DMZ_HOST_IP:-0.0.0.0}:443:443"
      - "${DMZ_HOST_IP:-0.0.0.0}:80:80"
      
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./monitoring/nginx/ssl:/etc/nginx/ssl:ro
      - ./monitoring/nginx/htpasswd:/etc/nginx/htpasswd:ro
      
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
      
    networks:
      - monitoring

# Networks
networks:
  monitoring:
    driver: bridge

# Volumes (aggiungi nagios_etc)
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  nagios_var:
    driver: local
  nagios_etc:
    driver: local