global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus stesso
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API OPNsense (LAN): usa l'IP della VM LAN dove gira l'API
  - job_name: 'opnsense-api'
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['192.168.216.50:3000']   # ← cambia con il tuo IP LAN dell'API

  # (Opzionale) Exporter vari aggiuntivi
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']