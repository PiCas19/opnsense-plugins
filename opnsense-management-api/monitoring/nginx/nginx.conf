events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Upstream definitions
    upstream grafana {
        server grafana:3000;
    }
    
    upstream prometheus {
        server prometheus:9090;
    }
    
    upstream nagios {
        server nagios:80;
    }
    
    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
    
    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;
        
        # SSL configuration
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Auth file for basic authentication
        auth_basic "Monitoring Access";
        auth_basic_user_file /etc/nginx/htpasswd;
        
        # Root location - redirect to Grafana
        location = / {
            return 302 /grafana/;
        }
        
        # Health check (no auth required)
        location /health {
            auth_basic off;
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Grafana proxy - FIX per evitare 301 loop
        location /grafana/ {
            # IMPORTANTE: proxy_pass SENZA trailing slash
            proxy_pass http://grafana;
            
            # Headers standard per reverse proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # CRITICO: Header per evitare redirect loop
            proxy_set_header X-Forwarded-Prefix /grafana;
            
            # IMPORTANTE: Disabilita tutti i redirect automatici
            proxy_redirect off;
            
            # WebSocket support per Grafana live features
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Evita cache per contenuti dinamici
            proxy_cache_bypass $http_upgrade;
        }
        
        # Gestione asset statici Grafana
        location ~* /grafana/public/.* {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Prefix /grafana;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
        
        # Gestione API calls Grafana
        location ~* /grafana/api/.* {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /grafana;
            proxy_redirect off;
        }
        
        # Prometheus proxy
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Remove any authentication headers for Prometheus
            proxy_set_header Authorization "";
        }
        
        # Nagios proxy
        location /nagios/ {
            proxy_pass http://nagios/nagios/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Nagios specific settings
            proxy_redirect off;
            proxy_buffering off;
        }
        
        # Static assets for Nagios
        location ~* /nagios/.*\.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            proxy_pass http://nagios;
            proxy_set_header Host $host;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }
}