log_file=/opt/nagios/var/nagios.log
cfg_file=/opt/nagios/etc/objects/commands.cfg
cfg_file=/opt/nagios/etc/objects/contacts.cfg
cfg_file=/opt/nagios/etc/objects/timeperiods.cfg
cfg_file=/opt/nagios/etc/objects/templates.cfg

# Definisci un host per l’API
define host{
  use                     linux-server
  host_name               opnsense-api
  alias                   OPNsense Management API
  address                 192.168.216.50      ; IP LAN dell’API
}

# Comando custom: healthcheck API
define command{
  command_name    check_opnsense_api
  command_line    /opt/nagios/libexec/custom/check_opnsense.sh -H $HOSTADDRESS$ -p 3000
}

# Servizio: /health
define service{
  use                     generic-service
  host_name               opnsense-api
  service_description     API Health
  check_command           check_opnsense_api
  check_interval          1
  retry_interval          1
}

# Abilita CGI (interfaccia web)
enable_notifications=1
enable_event_handlers=1
process_performance_data=1
check_external_commands=1

