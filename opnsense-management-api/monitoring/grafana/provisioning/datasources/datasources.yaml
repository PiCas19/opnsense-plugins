apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-ds
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeout: 30
      timeInterval: "30s"
    secureJsonData: {}

  - name: OPNsense API (JSON)
    type: marcusolsson-json-datasource
    uid: json-ds
    access: proxy
    # FIX: Usa il nome del container invece dell'IP
    url: http://opnsense-api:3000/api/v1
    editable: true
    jsonData:
      timeout: 30
      tlsSkipVerify: true
      httpHeaderName1: "Content-Type"
    secureJsonData:
      httpHeaderValue1: "application/json"