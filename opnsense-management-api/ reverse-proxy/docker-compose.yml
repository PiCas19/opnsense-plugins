services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opnsense-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./nginx/ssl:/etc/ssl/nginx:ro
      - ./logs/nginx:/var/log/nginx
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
      - OPNSENSE_API_HOST=${OPNSENSE_API_HOST:-192.168.216.50}
      - OPNSENSE_API_PORT=${OPNSENSE_API_PORT:-3000}
    depends_on:
      - grafana
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:10.2.0
    container_name: opnsense-grafana
    restart: unless-stopped
    environment:
      # Grafana Settings
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-https://localhost/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin123}
      
      # Database
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: ${POSTGRES_HOST:-192.168.216.50}:${POSTGRES_PORT:-5432}
      GF_DATABASE_NAME: ${GRAFANA_DB:-grafana}
      GF_DATABASE_USER: ${POSTGRES_USER:-opnsense}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      
      # Auth
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"
      
      # Plugins
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel,marcusolsson-json-datasource
      
      # Logging
      GF_LOG_LEVEL: ${GF_LOG_LEVEL:-info}
      
      # API Settings for OPNsense wrapper communication
      OPNSENSE_API_URL: http://${OPNSENSE_API_HOST:-192.168.216.50}:${OPNSENSE_API_PORT:-3000}
      
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./logs/grafana:/var/log/grafana
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  grafana_data:
    driver: local