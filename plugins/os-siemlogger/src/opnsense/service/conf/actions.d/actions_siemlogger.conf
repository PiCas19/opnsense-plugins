[start]
command:/usr/local/etc/rc.d/siemlogger start
parameters:
type:script
message:Starting SIEM Logger service

[stop]
command:/usr/local/etc/rc.d/siemlogger stop
parameters:
type:script
message:Stopping SIEM Logger service

[restart]
command:/usr/local/etc/rc.d/siemlogger restart
parameters:
type:script
message:Restarting SIEM Logger service

[status]
command:/usr/local/etc/rc.d/siemlogger status
parameters:
type:script_output
message:Getting SIEM Logger service status

[reconfigure]
command:/usr/local/opnsense/scripts/OPNsense/SiemLogger/siemlogger_control.sh 
parameters:reconfigure
type:script
message:Reconfiguring SIEM Logger service

[export_events]
command:/usr/local/opnsense/scripts/OPNsense/SiemLogger/siemlogger_control.sh export_events
parameters:export_events %s
type:script_output
message:Exporting SIEM Logger events

[get_stats]
command:/usr/local/opnsense/scripts/OPNsense/SiemLogger/siemlogger_control.sh
parameters:get_stats %s
type:script_output
message:Getting SIEM Logger statistics

[get_logs]
command:/usr/local/opnsense/scripts/OPNsense/SiemLogger/siemlogger_control.sh
parameters:get_logs %s %s
type:script_output
message:Getting SIEM Logger logs

[clear_logs]
command:/usr/local/opnsense/scripts/OPNsense/SiemLogger/siemlogger_control.sh
parameters:clear_logs
type:script_output
message:Clearing SIEM Logger logs

[test_export]
command:/usr/local/opnsense/scripts/OPNsense/SiemLogger/siemlogger_control.sh
parameters:test_export %s
type:script_output
message:Testing SIEM export configuration