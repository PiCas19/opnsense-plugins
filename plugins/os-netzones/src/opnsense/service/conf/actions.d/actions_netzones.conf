[start]
command:/usr/local/etc/rc.d/netzones start
parameters:
type:script
message:Starting NetZones Service

[stop]
command:/usr/local/etc/rc.d/netzones stop
parameters:
type:script
message:Stopping NetZones Service

[restart]
command:/usr/local/etc/rc.d/netzones restart
parameters:
type:script
message:Restarting NetZones Service

[status]
command:/usr/local/etc/rc.d/netzones status
parameters:
type:script_output
message:Getting NetZones Service Status

[reconfigure]
command:/usr/local/etc/rc.d/netzones restart
parameters:
type:script
message:Applying configuration and restarting NetZones Service

[setup]
command:/usr/local/opnsense/scripts/OPNsense/NetZones/setup.sh
parameters:
type:script
message:Preparing folders and logs for NetZones


[simulate_zone]
command:/usr/local/opnsense/scripts/OPNsense/NetZones/simulate_zone.py %s
parameters:
type:script_output
message:Simulate zone-based traffic decision

[test_zones]
command:/usr/local/opnsense/scripts/OPNsense/NetZones/simulate_zone.py --batch
parameters:
type:script_output
message:Run NetZones batch test with sample packets

[clear_logs]
command:/bin/sh -c "echo '' > /var/log/netzones_decisions.log && echo 'NetZones logs cleared'"
parameters:
type:script_output
message:Clear NetZones decision logs

[get_stats]
command:/bin/cat /var/run/netzones_stats.json
parameters:
type:script_output
message:Get NetZones service statistics