[start]
command:/usr/local/etc/rc.d/advinspector start
parameters:
type:script
message:Starting Advanced Packet Inspector

[stop]
command:/usr/local/etc/rc.d/advinspector stop
parameters:
type:script
message:Stopping Advanced Packet Inspector

[restart]
command:/usr/local/etc/rc.d/advinspector restart
parameters:
type:script
message:Restarting Advanced Packet Inspector

[status]
command:/usr/local/etc/rc.d/advinspector status
parameters:
type:script_output
message:Getting service status

[reconfigure]
command:/usr/local/etc/rc.d/advinspector restart
parameters:
type:script
message:Applying configuration and restarting Advanced Packet Inspector

[setup]
command:/usr/local/opnsense/scripts/OPNsense/AdvInspector/setup.sh
parameters:
type:script
message:Preparing required folders and logs

[export_rules]
command:/usr/local/opnsense/scripts/OPNsense/AdvInspector/export_rules.sh
parameters:
type:script
message:Export rules to JSON format

[simulate_packet]
command:/usr/local/opnsense/scripts/OPNsense/AdvInspector/simulate_packet.py %s
parameters:
type:script_output
message:Simulate packet inspection with rule engine