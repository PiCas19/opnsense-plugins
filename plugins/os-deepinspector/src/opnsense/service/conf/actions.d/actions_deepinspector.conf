[start]
command:/usr/local/etc/rc.d/deepinspector start
parameters:
type:script
message:Starting Deep Packet Inspector Engine

[stop]
command:/usr/local/etc/rc.d/deepinspector stop
parameters:
type:script
message:Stopping Deep Packet Inspector Engine

[restart]
command:/usr/local/etc/rc.d/deepinspector restart
parameters:
type:script
message:Restarting Deep Packet Inspector Engine

[status]
command:/usr/local/etc/rc.d/deepinspector status
parameters:
type:script_output
message:Getting DPI engine status

[reconfigure]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/export_config.py && /usr/local/etc/rc.d/deepinspector restart
parameters:
type:script
message:Reconfiguring Deep Packet Inspector Engine

[export_config]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/export_config.py
parameters:
type:script
message:Exporting DPI configuration

[update_signatures]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/update_signatures.py
parameters:
type:script_output
message:Updating threat signatures

[get_stats]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/get_stats.py
parameters:
type:script_output
message:Getting DPI statistics

[get_metrics]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/get_metrics.py
parameters:
type:script_output
message:Getting performance metrics

[flush_cache]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/flush_cache.py
parameters:
type:script
message:Flushing analysis cache

[update_threat_intel]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/update_threat_intel.py
parameters:
type:script_output
message:Updating threat intelligence feeds

[generate_diagnostics]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/generate_diagnostics.sh
parameters:
type:script
message:Generating diagnostic report

[run_tests]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/run_tests.py
parameters:
type:script_output
message:Running engine self-tests

[test_engine]
command:/usr/local/opnsense/scripts/OPNsense/DeepInspector/test_engine.py
parameters:
type:script_output
message:Testing DPI engine functionality

[block_ip]
command:/usr/local/bin/deepinspector_control.sh block_ip
parameters:%s
type:script
message:Blocking IP address

[unblock_ip]
command:/usr/local/bin/deepinspector_control.sh unblock_ip
parameters:%s
type:script
message:Unblocking IP address

[whitelist_ip]
command:/usr/local/bin/deepinspector_control.sh whitelist_ip
parameters:%s
type:script
message:Whitelisting IP address

[clear_logs]
command:/usr/local/bin/deepinspector_control.sh clear_logs
parameters:
type:script
message:Clearing DeepInspector logs