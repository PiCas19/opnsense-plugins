[start]
command:/usr/local/etc/rc.d/webguard start
parameters:
type:script
message:Starting WebGuard WAF Engine

[stop]
command:/usr/local/etc/rc.d/webguard stop
parameters:
type:script
message:Stopping WebGuard WAF Engine

[restart]
command:/usr/local/etc/rc.d/webguard restart
parameters:
type:script
message:Restarting WebGuard WAF Engine

[status]
command:/usr/local/etc/rc.d/webguard status
parameters:
type:script_output
message:Getting WebGuard WAF engine status

[reconfigure]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/export_config.py && /usr/local/etc/rc.d/webguard restart
parameters:
type:script
message:Reconfiguring WebGuard WAF Engine

[export_config]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/export_config.py
parameters:%s
type:script
message:Exporting WebGuard configuration

[get_stats]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_stats.py
parameters:engine
type:script_output
message:Getting WebGuard statistics

[get_threats]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_threats.py
parameters:%s
type:script_output
message:Getting threat data

[get_threat_detail]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_threats.py
parameters:detail %s
type:script_output
message:Getting threat details

[get_threat_stats]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_stats.py
parameters:threats %s
type:script_output
message:Getting threat statistics

[get_threat_feed]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_threats.py
parameters:feed %s %s
type:script_output
message:Getting threat feed

[mark_false_positive]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_threats.py
parameters:false_positive %s %s
type:script
message:Marking threat as false positive

[whitelist_ip_from_threat]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_threats.py
parameters:whitelist_ip %s %s %s
type:script
message:Adding IP to whitelist from threat

[block_ip_from_threat]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_threats.py
parameters:block_ip %s %s %s
type:script
message:Blocking IP from threat

[create_rule_from_threat]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_threats.py
parameters:create_rule %s %s %s %s
type:script
message:Creating custom rule from threat

[export_threats]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_threats.py
parameters:export %s
type:script_output
message:Exporting threat data

[clear_old_threats]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_threats.py
parameters:clear_old %s %s
type:script
message:Clearing old threats

[get_geo_stats]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_stats.py
parameters:geo %s
type:script_output
message:Getting geographic statistics

[get_attack_patterns]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_threats.py
parameters:patterns %s %s
type:script_output
message:Getting attack patterns

[get_blocked_ips]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_blocking.py
parameters:list %s
type:script_output
message:Getting blocked IPs

[get_whitelist]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_whitelist.py
parameters:list %s %s
type:script_output
message:Getting whitelist entries

[block_ip]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_blocking.py
parameters:block %s %s %s %s
type:script
message:Blocking IP address

[unblock_ip]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_blocking.py
parameters:unblock %s %s
type:script
message:Unblocking IP address

[bulk_block_ips]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_blocking.py
parameters:bulk_block %s %s %s %s
type:script
message:Bulk blocking IP addresses

[bulk_unblock_ips]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_blocking.py
parameters:bulk_unblock %s %s
type:script
message:Bulk unblocking IP addresses

[add_to_whitelist]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_whitelist.py
parameters:add %s %s %s %s
type:script
message:Adding IP to whitelist

[remove_from_whitelist]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_whitelist.py
parameters:remove %s %s
type:script
message:Removing IP from whitelist

[clear_expired_blocks]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_blocking.py
parameters:clear_expired
type:script
message:Clearing expired blocks

[get_blocking_stats]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_stats.py
parameters:blocking %s
type:script_output
message:Getting blocking statistics

[export_blocked_ips]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_blocking.py
parameters:export %s %s
type:script_output
message:Exporting blocked IPs

[import_blocked_ips]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_blocking.py
parameters:import %s %s %s %s
type:script
message:Importing blocked IPs

[get_ip_history]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/manage_blocking.py
parameters:history %s
type:script_output
message:Getting IP history

[test_rules]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/test_rules.py
parameters:%s %s
type:script_output
message:Testing WAF rules

[update_rules]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/update_rules.py
parameters:
type:script
message:Updating WAF rules