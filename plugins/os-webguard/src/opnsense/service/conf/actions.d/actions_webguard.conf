[start]
command:/usr/local/etc/rc.d/webguard start
parameters:
type:script
message:Starting WebGuard WAF Engine

[stop]
command:/usr/local/etc/rc.d/webguard stop
parameters:
type:script
message:Stopping WebGuard WAF Engine

[restart]
command:/usr/local/etc/rc.d/webguard restart
parameters:
type:script
message:Restarting WebGuard WAF Engine

[status]
command:/usr/local/etc/rc.d/webguard status
parameters:
type:script_output
message:Getting WebGuard WAF engine status

[reconfigure]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/export_config.py && /usr/local/etc/rc.d/webguard restart
parameters:
type:script
message:Reconfiguring WebGuard WAF Engine

[export_config]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/export_config.py
parameters:%s
type:script
message:Exporting WebGuard configuration

[get_stats]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/webguard_control.sh
parameters:get_stats %s
type:script_output
message:Getting WebGuard statistics

[get_threats]
command:/usr/local/opnsense/scripts/OPNsense/WebGuard/get_threats.py
parameters:%s
type:script_output
message:Getting threat data

[get_threat_detail]
