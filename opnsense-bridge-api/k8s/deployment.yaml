apiVersion: apps/v1
kind: Deployment
metadata:
  name: opnsense-monitoring-bridge
  namespace: opnsense-bridge
  labels:
    app: opnsense-monitoring-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opnsense-monitoring-bridge
  template:
    metadata:
      labels:
        app: opnsense-monitoring-bridge
    spec:
      containers:
      - name: opnsense-monitoring-bridge
        image: opnsense-monitoring-bridge:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8443
          name: https
        envFrom:
        - configMapRef:
            name: opnsense-bridge-config
        - secretRef:
            name: opnsense-bridge-secrets
        volumeMounts:
        - name: certs
          mountPath: /app/certs
          readOnly: true
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: https
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/detailed
            port: https
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: certs
        secret:
          secretName: opnsense-bridge-certs
      imagePullSecrets:
      - name: registry-secret  # Optional: for private registry