apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opnsense-monitoring-bridge
  namespace: opnsense-bridge
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/whitelist-source-range: "172.16.216.0/24"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - bridge.example.com
    secretName: opnsense-bridge-certs
  rules:
  - host: bridge.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opnsense-monitoring-bridge
            port:
              number: 8443