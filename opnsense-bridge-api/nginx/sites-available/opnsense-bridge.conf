server {
    listen 8443 ssl;
    server_name 172.16.216.10;

    # SSL configuration from .env
    ssl_certificate /app/certs/server.crt;
    ssl_certificate_key /app/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_verify_client off;

    # IP whitelisting from ALLOWED_IPS
    allow 172.16.216.0/24;
    allow 192.168.216.0/24;
    allow 127.0.0.1;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:8000; # FastAPI running via uvicorn
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    error_page 403 /403.html;
    location = /403.html {
        return 403 "Access denied: Your IP is not in ALLOWED_IPS";
    }
}