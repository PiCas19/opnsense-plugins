# =============================================
# Logging Configuration
# =============================================

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S %Z"
  json:
    class: "pythonjsonlogger.jsonlogger.JsonFormatter"
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  console:
    class: "logging.StreamHandler"
    level: "INFO"
    formatter: "standard"
  
  file:
    class: "logging.handlers.RotatingFileHandler"
    level: "INFO"
    formatter: "standard"
    filename: "/opt/opnsense-monitoring-bridge/logs/bridge.log"
    maxBytes: 10485760  # 10MB
    backupCount: 5
  
  audit:
    class: "logging.handlers.RotatingFileHandler"
    level: "INFO"
    formatter: "json"
    filename: "/opt/opnsense-monitoring-bridge/logs/audit.log"
    maxBytes: 5242880  # 5MB
    backupCount: 10

loggers:
  app:
    level: "INFO"
    handlers: ["console", "file"]
    propagate: false
  
  security:
    level: "WARNING"
    handlers: ["file", "audit"]
    propagate: false
  
  opnsense:
    level: "DEBUG"
    handlers: ["file"]
    propagate: false

root:
  level: "WARNING"
  handlers: ["console"]